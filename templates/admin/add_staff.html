{% extends "admin/base.html" %}

{% block styles %}
<link rel="stylesheet"
          href="{{ url_for('static', filename='css/login.css') }}">
{% endblock %}

{% block content %}

    <h2 class="text-center mb-2">ADD STAFF</h2>

    <form action="/register" method="POST">

        <div class="mb-3">
            <label class="form-label">Username</label>
            <input
                type="text"
                class="form-control"
                name="username"
                placeholder="Enter username"
                required>
        </div>

        <div class="mb-3">
            <label class="form-label">Email</label>
            <input
                type="email"
                class="form-control"
                name="email"
                placeholder="Enter email"
                required>
        </div>

        <div class="mb-3">
            <label class="form-label">Phone Number</label>
            <input
                type="phone"
                class="form-control"
                name="phone"
                placeholder="Enter Phone Number"
                required>
        </div>

        <div class="mb-3">
            <label class="form-label">Password</label>
            <input
                type="password"
                class="form-control"
                name="password"
                placeholder="Enter your password"
                required>
        </div>


        <div class="d-grid">
            <button type="submit" class="btn btn-success">
                ADD STAFF
            </button>
        </div>

    </form>

</div>

{% endblock %}
