<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Add Order</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<style>

body{
    background:#f5f7fa;
}

.card{
    border:none;
    border-radius:15px;
    box-shadow:0 5px 20px rgba(0,0,0,.08);
}

.search-box{
    height:55px;
    font-size:18px;
}

.table td{
    vertical-align:middle;
}

.total-box{
    font-size:18px;
}

.qty-btn{
    width:35px;
}

.summary{
    background:#0d6efd;
    color:white;
    border-radius:15px;
}

.complete-btn{
    height:60px;
    font-size:20px;
}

</style>

</head>

<body>

<div class="container py-4">

<div class="d-flex justify-content-between align-items-center mb-4">

<h2>
<i class="bi bi-cart-check"></i>
New Order
</h2>

<button class="btn btn-dark">
<i class="bi bi-upc-scan"></i>
Scan Barcode
</button>

</div>

<div class="card p-4 mb-4">

<div class="row">

<div class="col-md-8">

<input
type="text"
class="form-control search-box"
placeholder="Search product or scan barcode...">

</div>

<div class="col-md-4">

<button class="btn btn-primary w-100 search-box">
<i class="bi bi-search"></i>
Search Product
</button>

</div>

</div>

</div>

<div class="row">

<div class="col-lg-8">

<div class="card p-3">

<h4 class="mb-3">Order Items</h4>

<table class="table table-hover">

<thead class="table-dark">

<tr>

<th>Product</th>
<th>Price</th>
<th width="180">Qty</th>
<th>Total</th>
<th></th>

</tr>

</thead>

<tbody>

<tr>

<td>Coca Cola 500ml</td>

<td>₹40</td>

<td>

<div class="btn-group">

<button class="btn btn-outline-secondary qty-btn">-</button>

<input
type="text"
class="form-control text-center"
value="1"
style="width:60px;">

<button class="btn btn-outline-secondary qty-btn">+</button>

</div>

</td>

<td>₹40</td>

<td>

<button class="btn btn-danger btn-sm">

<i class="bi bi-trash"></i>

</button>

</td>

</tr>

<tr>

<td>Potato Chips</td>

<td>₹30</td>

<td>

<div class="btn-group">

<button class="btn btn-outline-secondary qty-btn">-</button>

<input
type="text"
class="form-control text-center"
value="2"
style="width:60px;">

<button class="btn btn-outline-secondary qty-btn">+</button>

</div>

</td>

<td>₹60</td>

<td>

<button class="btn btn-danger btn-sm">

<i class="bi bi-trash"></i>

</button>

</td>

</tr>

</tbody>

</table>

</div>

</div>

<div class="col-lg-4">

<div class="card summary p-4">

<h4 class="mb-4">

Order Summary

</h4>

<div class="d-flex justify-content-between total-box">

<span>Items</span>

<strong>3</strong>

</div>

<hr>

<div class="d-flex justify-content-between total-box">

<span>Subtotal</span>

<strong>₹100</strong>

</div>

<hr>

<div class="d-flex justify-content-between total-box">

<span>Discount</span>

<strong>₹0</strong>

</div>

<hr>

<div class="d-flex justify-content-between total-box">

<span>Tax</span>

<strong>₹0</strong>

</div>

<hr>

<div class="d-flex justify-content-between fs-4">

<strong>Total</strong>

<strong>₹100</strong>

</div>

<div class="mt-4">

<label class="form-label">

Payment Method

</label>

<select class="form-select">

<option>Cash</option>

<option>UPI</option>

<option>Credit Card</option>

<option>Debit Card</option>

</select>

</div>

<button class="btn btn-warning w-100 complete-btn mt-4">

<i class="bi bi-check-circle"></i>

Complete Order

</button>

</div>

</div>

</div>

</div>

</body>
</html>
