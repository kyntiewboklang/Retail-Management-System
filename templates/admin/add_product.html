{% extends "admin/base.html" %}
{% block content %}

<div class="container py-5">
    <div class="row">

        <!-- Product Form -->
        <div class="col-lg-8">

            <div class="card shadow border-0">
                <div class="card-header bg-primary text-white">
                    <h3 class="mb-0">🛒 Add New Product</h3>
                </div>

                <div class="card-body">

                    <form action="{{ url_for('add_product') }}" method="POST">

                        <div class="mb-3">
                            <label for="product_name" class="form-label">Product Name</label>
                            <input
                                type="text"
                                class="form-control"
                                id="product_name"
                                name="product_name"
                                placeholder="Enter product name"
                                required>
                        </div>

                        <div class="row">

                            <div class="col-md-6 mb-3">
                                <label for="category" class="form-label">Category</label>
                                <select class="form-select" id="category" name="category" required>
                                    <option selected disabled>Select Category</option>
                                    <option>Electronics</option>
                                    <option>Groceries</option>
                                    <option>Clothing</option>
                                    <option>Home & Kitchen</option>
                                    <option>Beauty</option>
                                    <option>Sports</option>
                                </select>
                            </div>

                            <div class="col-md-6 mb-3">
                                <label for="brand" class="form-label">Brand</label>
                                <input
                                    type="text"
                                    class="form-control"
                                    id="brand"
                                    name="brand"
                                    placeholder="Brand Name">
                            </div>

                        </div>

                        <div class="row">

                            <div class="col-md-4 mb-3">
                                <label for="price" class="form-label">Price (₹)</label>
                                <input
                                    type="number"
                                    step="0"
                                    class="form-control"
                                    id="price"
                                    name="price"
                                    required>
                            </div>

                            <div class="col-md-4 mb-3">
                                <label for="quantity" class="form-label">Quantity</label>
                                <input
                                    type="number"
                                    class="form-control"
                                    id="quantity"
                                    name="quantity"
                                    required>
                            </div>

                            <div class="col-md-4 mb-3">

                                <label for="sku" class="form-label">SKU</label>

                                <div class="input-group">

                                    <input
                                        type="text"
                                        id="sku"
                                        name="sku"
                                        class="form-control"
                                        >

                                    <button
                                        type="button"
                                        class="btn btn-primary"
                                        onclick="generateSKU()">

                                        Generate

                                    </button>

                                </div>

                            </div>

                        </div>

                        <div class="row">

                            <div class="col-md-4 mb-3">
                                <label for="manufacture_date" class="form-label">Manufacture Date</label>
                                <input
                                    type="date"
                                    class="form-control"
                                    id="manufacture_date"
                                    name="manufacture_date">
                            </div>

                            <div class="col-md-4 mb-3">
                                <label for="expiry_date" class="form-label">Expiry Date</label>
                                <input
                                    type="date"
                                    class="form-control"
                                    id="expiry_date"
                                    name="expiry_date">
                            </div>

                        </div>

                        <div class="mb-3">
                            <label for="supplier" class="form-label">Supplier</label>
                            <input
                                type="text"
                                class="form-control"
                                id="supplier"
                                name="supplier"
                                placeholder="Supplier Name">
                        </div>

                        <div class="row">

                                <div class="row align-items-end">

                                    <div class="col-md-8">

                                        <label class="form-label">

                                            Barcode

                                        </label>

                                        <div class="input-group">

                                            <input
                                                type="text"
                                                id="barcode"
                                                name="barcode"
                                                class="form-control"
                                                >

                                            <button
                                                type="button"
                                                class="btn btn-success"
                                                onclick="generateBarcode()">

                                                Generate

                                            </button>

                                        </div>

                                    </div>

                                    <div class="col-md-4">

                                        <button
                                            type="button"
                                            class="btn btn-dark w-100"
                                            onclick="printBarcode()">

                                            Print Barcode

                                        </button>

                                    </div>

                                </div>
                            </div>
                        </div>

                    <div class="d-flex justify-content-between">

                        <button
                            type="button"
                            id="clearForm"
                            class="btn btn-secondary">
                            Cancel
                        </button>

                        <button class="btn btn-success">
                            Save Product
                        </button>

                    </div>
            </div>
        </div>

        <!-- Scanner Panel -->
        <div class="col-lg-4">

            <div class="card shadow border-0">

                <div class="card-header bg-dark text-white">
                    <h5 class="mb-0">📷 Barcode Scanner</h5>
                </div>

                <div class="card-body text-center">

                    <!-- Camera Preview -->
                    <video
                        id="reader"
                        style="
                            width:100%;
                            height:250px;
                            border-radius:10px;
                            object-fit:cover;
                        ">
                    </video>

                    <div class="d-grid gap-2 mt-3">

                        <div class="mb-3">
                            <label class="form-label">Select Camera</label>

                            <select id="cameraSelect" class="form-select">
                                <option value="">Loading cameras...</option>
                            </select>
                        </div>

                        <button
                            class="btn btn-danger"
                            id="stopCamera"
                            type="button">
                            ⏹ Stop Camera
                        </button>

                    </div>

                    <hr>

                    <h6>Last Scanned Barcode</h6>

                    <input
                        type="text"
                        id="barcodeResult"
                        class="form-control text-center"
                        placeholder="Waiting for scan..."
                        readonly>

                    <small class="text-muted">
                        Camera or USB scanner will automatically fill the SKU field.
                    </small>

                </div>

            </div>

        </div>

    </div>
</div>


<script src="https://unpkg.com/@zxing/library@latest"></script>
<script src="{{ url_for('static', filename='js/add_product_scanner.js') }}"></script>

<script>
function generateSKU(){

    const date = new Date();

    const year = date.getFullYear();

    const random = Math.floor(Math.random()*9000)+1000;

    document.getElementById("sku").value =
        "SKU-" + year + "-" + random;

}

function generateBarcode(){

    let barcode="";

    for(let i=0;i<13;i++){

        barcode += Math.floor(Math.random()*10);

    }

    document.getElementById("barcode").value=barcode;

    fetch("/generate_barcode/"+barcode)

    .then(r=>r.text())

    .then(path=>{

        const img=document.getElementById("barcodeImage");

        img.src="/"+path;

        img.style.display="block";

    });

}

function printBarcode(){

    const w=window.open("");

    w.document.write(

        document.getElementById("barcodeImage").outerHTML

    );

    w.print();

}
</script>

{% endblock %}
