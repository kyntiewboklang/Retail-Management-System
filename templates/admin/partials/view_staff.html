<div class="card shadow">

    <div class="card-header bg-primary text-white">
        <h4 class="mb-0">Staff List</h4>
    </div>

    <div class="card-body">

        <table class="table table-bordered table-hover">

            <thead>

                <tr>
                    <th>ID</th>
                    <th>Username</th>
                    <th>Email</th>
                    <th>Role</th>
                    <th>Actions</th>
                </tr>

            </thead>

            <tbody>

            {% for staff in staffs %}

                <tr>

                    <td>{{ staff[0] }}</td>
                    <td>{{ staff[1] }}</td>
                    <td>{{ staff[2] }}</td>
                    <td>{{ staff[3] }}</td>

                    <td>

                        <a href="#"
                           class="btn btn-warning btn-sm">

                            Edit

                        </a>

                        <a href="#"
                           class="btn btn-danger btn-sm">

                            Delete

                        </a>

                    </td>

                </tr>

            {% endfor %}

            </tbody>

        </table>

    </div>

</div>
