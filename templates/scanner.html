{% extends "base.html" %}

{% block content %}

<div class="container py-4">

    <!-- Header -->
    <div class="d-flex justify-content-between align-items-center mb-4">

        <h2>
            <i class="bi bi-upc-scan"></i>
            QR & Barcode Scanner
        </h2>

        <a href="/new-orders" class="btn btn-outline-secondary">
            <i class="bi bi-arrow-left"></i>
            Back
        </a>

    </div>

    <!-- Scanner Card -->
    <div class="card shadow-lg border-0 rounded-4">

        <div class="card-body p-4">

            <div class="text-center mb-3">

                <h5>Scan a Product</h5>

                <p class="text-muted">
                    Position the QR code or barcode inside the frame.
                </p>

            </div>

            <!-- Camera -->
            <div id="reader" class="scanner-box"></div>

            <!-- Status -->
            <div class="alert alert-info mt-4 text-center" id="status">

                Waiting for scan...

            </div>

        </div>

    </div>

</div>

<!-- html5-qrcode -->
<script src="https://unpkg.com/html5-qrcode"></script>

<script>

const statusBox = document.getElementById("status");

function onScanSuccess(decodedText, decodedResult) {

    statusBox.className = "alert alert-success mt-4 text-center";
    statusBox.innerHTML = `
        <strong>Product Found!</strong><br>
        ${decodedText}<br>
        Redirecting...
    `;

    html5QrCode.stop().then(() => {

        setTimeout(() => {

            window.location.href =
                "/new-orders?barcode=" +
                encodeURIComponent(decodedText);

        }, 600);

    });

}

function onScanFailure(error) {
    // Ignore continuous scan errors
}

const html5QrCode = new Html5Qrcode("reader");

Html5Qrcode.getCameras().then(devices => {

    if (devices && devices.length) {

        html5QrCode.start(

            { facingMode: "environment" },

            {
                fps: 10,
                qrbox: {
                    width: 260,
                    height: 260
                }
            },

            onScanSuccess,
            onScanFailure

        );

    }

}).catch(err => {

    statusBox.className = "alert alert-danger mt-4";

    statusBox.innerHTML =
        "Unable to access camera.<br>" + err;

});

</script>

<style>

.scanner-box{

    width:100%;
    max-width:500px;
    margin:auto;
}

#reader{

    border:4px solid #0d6efd;
    border-radius:20px;
    overflow:hidden;
    background:white;
}

#reader video{

    border-radius:16px;
}

</style>

{% endblock %}
