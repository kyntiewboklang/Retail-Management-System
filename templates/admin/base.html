<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Department Store Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
<link rel="stylesheet" href="{{ url_for('static', filename='css/products.css') }}">

</head>
<body>

    <div class="sidebar">

    <h3><i class="bi bi-shop"></i> Store</h3>

    <a href="/admin/dashboard"><i class="bi bi-speedometer2"></i> Dashboard</a>
    <a href="/admin/products"><i class="bi bi-box-seam"></i> Products</a>
    <a href="#"><i class="bi bi-cart-check"></i> Orders</a>
    <!-- <a href="#"><i class="bi bi-upc-scan"></i> Barcode Scanner</a> -->
    <a href="#"><i class="bi bi-people"></i> Customers</a>
    <a href="#"><i class="bi bi-person-badge"></i> Staff</a>
    <a href="#"><i class="bi bi-graph-up-arrow"></i> Reports</a>
    <a href="#"><i class="bi bi-gear"></i> Settings</a>

    </div>

    <div class="main">
        {% block content %}
        {% endblock %}
    </div>

<script>

function showAddProduct(){

    document.getElementById("add-product").style.display = "block";
    document.getElementById("view-products").style.display = "none";

    document.getElementById("btnAdd").classList.remove("btn-outline-success");
    document.getElementById("btnAdd").classList.add("btn-success");

    document.getElementById("btnView").classList.remove("btn-primary");
    document.getElementById("btnView").classList.add("btn-outline-primary");
}

function showViewProducts(){

    document.getElementById("add-product").style.display = "none";
    document.getElementById("view-products").style.display = "block";

    document.getElementById("btnView").classList.remove("btn-outline-primary");
    document.getElementById("btnView").classList.add("btn-primary");

    document.getElementById("btnAdd").classList.remove("btn-success");
    document.getElementById("btnAdd").classList.add("btn-outline-success");
}

</script>

</body>
</html>
