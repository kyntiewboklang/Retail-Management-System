{% extends "base.html" %}
{% block content %}

<div class="topbar d-flex justify-content-between align-items-center">

<h3>Dashboard</h3>

<div>

<form action="/new-orders" method="GET">
    <button type="submit" class="btn btn-primary">
        <i class="bi bi-plus-circle"></i>
        New Order
    </button>
</form>

</div>

</div>

<div class="container-fluid mt-4">

<div class="row g-4">

<div class="col-md-3">

<div class="card card-dashboard p-3">

<div class="d-flex justify-content-between">

<div>

<h6>Total Sales</h6>
<h3>₹1,25,000</h3>

</div>

<div class="icon bg-success">
<i class="bi bi-currency-rupee"></i>
</div>

</div>

</div>

</div>

<div class="col-md-3">

<div class="card card-dashboard p-3">

<div class="d-flex justify-content-between">

<div>

<h6>Orders Today</h6>
<h3>56</h3>

</div>

<div class="icon bg-primary">
<i class="bi bi-cart-fill"></i>
</div>

</div>

</div>

</div>

<div class="col-md-3">

<div class="card card-dashboard p-3">

<div class="d-flex justify-content-between">

<div>

<h6>Products</h6>
<h3>824</h3>

</div>

<div class="icon bg-warning">
<i class="bi bi-box-seam"></i>
</div>

</div>

</div>

</div>

<div class="col-md-3">

<div class="card card-dashboard p-3">

<div class="d-flex justify-content-between">

<div>

<h6>Low Stock</h6>
<h3>14</h3>

</div>

<div class="icon bg-danger">
<i class="bi bi-exclamation-triangle"></i>
</div>

</div>

</div>

</div>

</div>

<div class="row mt-4">

<div class="col-md-8">

<div class="card card-dashboard p-4">

<h5>Recent Orders</h5>

<table class="table mt-3">

<thead>

<tr>
<th>Order ID</th>
<th>Customer</th>
<th>Amount</th>
<th>Status</th>
</tr>

</thead>

<tbody>

<tr>

<td>#1024</td>
<td>John</td>
<td>₹450</td>
<td><span class="badge bg-success">Completed</span></td>

</tr>

<tr>

<td>#1025</td>
<td>Emily</td>
<td>₹780</td>
<td><span class="badge bg-warning">Pending</span></td>

</tr>

<tr>

<td>#1026</td>
<td>David</td>
<td>₹1260</td>
<td><span class="badge bg-success">Completed</span></td>

</tr>

</tbody>

</table>

</div>

</div>

<div class="col-md-4">

<div class="card card-dashboard p-4">

<h5>Quick Actions</h5>

<div class="d-grid gap-3 mt-3">

<button class="btn btn-primary quick-btn">
<i class="bi bi-cart-plus fs-3"></i><br>
Add Order
</button>

<button class="btn btn-success quick-btn">
<i class="bi bi-box-seam fs-3"></i><br>
Add Product
</button>

<button class="btn btn-warning quick-btn">
<i class="bi bi-upc-scan fs-3"></i><br>
Scan Barcode
</button>

<button class="btn btn-danger quick-btn">
<i class="bi bi-graph-up-arrow fs-3"></i><br>
View Reports
</button>

</div>

</div>

</div>

</div>

</div>

{% endblock %}
