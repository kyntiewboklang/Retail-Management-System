{% extends "admin/base.html" %}
{% block content %}

<div class="container-fluid py-4">

    <div class="row g-4">

        <!-- ================= LEFT SIDE ================= -->
        <div class="col-lg-8">

            <!-- Search -->
            <div class="card shadow-sm border-0 mb-3">

                <div class="card-body">

                    <div class="row g-2">

                        <div class="col-md-10">

                            <input
                                id="barcodeInput"
                                type="text"
                                class="form-control form-control-lg"
                                placeholder="Enter barcode to add product">

                        </div>

                        <div class="col-md-2 d-grid">

                            <button
                                class="btn btn-primary btn-lg"
                                id="searchProduct">

                                <i class="bi bi-search"></i>

                            </button>

                        </div>

                    </div>

                </div>

            </div>

            <!-- Current Order -->
            <div class="card shadow-sm border-0">

                <div class="card-header bg-dark text-white">

                    <h5 class="mb-0">

                        <i class="bi bi-cart3"></i>

                        Current Order

                    </h5>

                </div>

                <div class="table-responsive">

                    <table class="table table-hover align-middle mb-0">

                        <thead class="table-light">

                        <tr>

                            <th>Product</th>
                            <th width="120">Price</th>
                            <th width="180">Qty</th>
                            <th width="120">Total</th>
                            <th width="70">Remove</th>

                        </tr>

                        </thead>

                        <tbody id="orderTable">

                            <!-- ###### -->

                        </tbody>

                    </table>

                </div>

            </div>

        </div>

        <!-- ================= RIGHT SIDE ================= -->
        <div class="col-lg-4">

            <!-- Scanner -->
            <div class="card shadow-sm border-0 mb-3">

                <div class="card-header bg-dark text-white">

                    <h5 class="mb-0">

                        <i class="bi bi-upc-scan"></i>

                        Barcode Scanner

                    </h5>

                </div>

                <div class="card-body">

                    <video
                        id="reader"
                        style="
                            width:100%;
                            border-radius:10px;
                            border:2px solid #ddd;
                            min-height:250px;
                            background:#000;">
                    </video>

                    <div class="d-grid gap-2 mt-3">

                        <button
                            id="startCamera"
                            class="btn btn-success">

                            <i class="bi bi-camera-video-fill"></i>

                            Start Camera

                        </button>

                        <button
                            id="stopCamera"
                            class="btn btn-danger">

                            <i class="bi bi-camera-video-off-fill"></i>

                            Stop Camera

                        </button>

                    </div>

                    <div class="alert alert-success mt-3 mb-0">

                        <strong>Last Barcode:</strong>

                        <br>

                        <span id="barcodeResult">

                            Waiting...

                        </span>

                    </div>

                </div>

            </div>

            <!-- Order Summary -->
            <div class="card shadow border-0">

                <div class="card-body">

                    <h4 class="mb-4">

                        <i class="bi bi-receipt"></i>

                        Order Summary

                    </h4>

                    <div class="d-flex justify-content-between mb-2">

                        <span>Items</span>

                        <strong id="totalItems">

                            0

                        </strong>

                    </div>

                    <div class="d-flex justify-content-between mb-2">

                        <span>Subtotal</span>

                        <strong id="subtotal">

                            ₹0

                        </strong>

                    </div>

                    <div class="d-flex justify-content-between mb-2">

                        <span>Discount</span>

                        <strong>

                            ₹0

                        </strong>

                    </div>

                    <div class="d-flex justify-content-between mb-2">

                        <span>Tax</span>

                        <strong>

                            ₹0

                        </strong>

                    </div>

                    <hr>

                    <div class="d-flex justify-content-between fs-4">

                        <strong>Total</strong>

                        <strong id="grandTotal">

                            ₹0

                        </strong>

                    </div>

                    <div class="mt-4">

                        <label class="form-label">

                            Payment Method

                        </label>

                        <select id="paymentMethod" class="form-select">

                            <option>Cash</option>

                            <option>UPI</option>

                            <option>Credit Card</option>

                            <option>Debit Card</option>

                        </select>

                    </div>

                    <button
                        id="completeOrder"
                        class="btn btn-warning w-100 mt-4 btn-lg">

                        <i class="bi bi-check-circle-fill"></i>

                        Complete Order

                    </button>

                </div>

            </div>

        </div>

    </div>

</div>

<!-- ZXing -->
<script src="https://unpkg.com/@zxing/library@latest"></script>

<!-- Scanner Script -->
<script src="{{ url_for('static', filename='js/new_order_scanner.js') }}"></script>

{% endblock %}
