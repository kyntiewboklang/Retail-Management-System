{% extends "admin/base.html" %}
{% block content %}

<div class="container-fluid py-3">

<div class="row g-3">

    <!-- ================= PRODUCT FORM ================= -->
    <div class="col-lg-8">

        <div class="card shadow-sm border-0">

            <div class="card-header bg-primary text-white py-2">
                <h5 class="mb-0">
                    <i class="bi bi-box-seam me-2"></i>
                    Add Product
                </h5>
            </div>

            <div class="card-body">

                <form action="{{ url_for('add_product') }}" method="POST">

                    <!-- Product Name -->
                    <div class="mb-3">

                        <label class="form-label">
                            Product Name
                        </label>

                        <input
                            type="text"
                            id="product_name"
                            name="product_name"
                            class="form-control"
                            placeholder="Enter product name"
                            required>

                    </div>


                    <!-- Category & Brand -->
                    <div class="row g-2 mb-3">

                        <div class="col-md-6">

                            <label class="form-label">
                                Category
                            </label>

                            <select
                                id="category"
                                name="category"
                                class="form-select"
                                required>

                                <option value="" selected disabled>
                                    Select category
                                </option>

                                <option>Electronics</option>
                                <option>Groceries</option>
                                <option>Clothing</option>
                                <option>Home & Kitchen</option>
                                <option>Beauty</option>
                                <option>Sports</option>

                            </select>

                        </div>

                        <div class="col-md-6">

                            <label class="form-label">
                                Brand
                            </label>

                            <input
                                type="text"
                                id="brand"
                                name="brand"
                                class="form-control"
                                placeholder="Brand name">

                        </div>

                    </div>


                    <!-- Price, Quantity & SKU -->
                    <div class="row g-2 mb-3">

                        <div class="col-md-4">

                            <label class="form-label">
                                Price
                            </label>

                            <div class="input-group">

                                <span class="input-group-text">₹</span>

                                <input
                                    type="number"
                                    step="0.01"
                                    min="0"
                                    id="price"
                                    name="price"
                                    class="form-control"
                                    placeholder="0.00"
                                    required>

                            </div>

                        </div>


                        <div class="col-md-4">

                            <label class="form-label">
                                Quantity
                            </label>

                            <input
                                type="number"
                                min="0"
                                id="quantity"
                                name="quantity"
                                class="form-control"
                                placeholder="0"
                                required>

                        </div>


                        <div class="col-md-4">

                            <label class="form-label">
                                SKU
                            </label>

                            <div class="input-group">

                                <input
                                    type="text"
                                    id="sku"
                                    name="sku"
                                    class="form-control"
                                    placeholder="SKU">

                                <button
                                    type="button"
                                    class="btn btn-outline-primary"
                                    onclick="generateSKU()">

                                    Generate

                                </button>

                            </div>

                        </div>

                    </div>


                    <!-- Dates & Supplier -->
                    <div class="row g-2 mb-3">

                        <div class="col-md-4">

                            <label class="form-label">
                                Manufacture Date
                            </label>

                            <input
                                type="date"
                                id="manufacture_date"
                                name="manufacture_date"
                                class="form-control">

                        </div>

                        <div class="col-md-4">

                            <label class="form-label">
                                Expiry Date
                            </label>

                            <input
                                type="date"
                                id="expiry_date"
                                name="expiry_date"
                                class="form-control">

                        </div>

                        <div class="col-md-4">

                            <label class="form-label">
                                Supplier
                            </label>

                            <input
                                type="text"
                                id="supplier"
                                name="supplier"
                                class="form-control"
                                placeholder="Supplier">

                        </div>

                    </div>


                    <!-- Barcode -->
                    <div class="mb-3">

                        <label class="form-label">
                            Barcode
                        </label>

                        <div class="input-group">

                            <span class="input-group-text">
                                <i class="bi bi-upc-scan"></i>
                            </span>

                            <input
                                type="text"
                                id="barcode"
                                name="barcode"
                                class="form-control"
                                placeholder="Enter or scan barcode"
                                required>

                            <button
                                type="button"
                                class="btn btn-outline-success"
                                onclick="generateBarcode()">

                                Generate

                            </button>

                        </div>

                    </div>


                    <!-- Barcode Preview -->
                    <div
                        id="barcodePreview"
                        class="mb-3 text-center"
                        style="display:none;">

                        <img
                            id="barcodeImage"
                            src=""
                            alt="Barcode"
                            style="max-height:70px;">

                        <button
                            type="button"
                            class="btn btn-sm btn-outline-dark ms-2"
                            onclick="printBarcode()">

                            <i class="bi bi-printer"></i>
                            Print

                        </button>

                    </div>


                    <!-- Buttons -->
                    <div class="d-flex justify-content-end gap-2">

                        <button
                            type="reset"
                            id="clearForm"
                            class="btn btn-secondary">

                            Clear

                        </button>

                        <button
                            type="submit"
                            class="btn btn-success">

                            <i class="bi bi-check-circle me-1"></i>
                            Save Product

                        </button>

                    </div>

                </form>

            </div>

        </div>

    </div>


    <!-- ================= BARCODE SCANNER ================= -->
    <div class="col-lg-4">

        <div class="card shadow-sm border-0">

            <div class="card-header bg-dark text-white py-2">

                <h5 class="mb-0">
                    <i class="bi bi-upc-scan me-2"></i>
                    Barcode Scanner
                </h5>

            </div>

            <div class="card-body">

                <!-- Camera -->
                <video
                    id="reader"
                    autoplay
                    playsinline
                    class="w-100 bg-dark rounded"
                    style="
                        height:200px;
                        object-fit:cover;
                    ">
                </video>


                <!-- Camera Select -->
                <select
                    id="cameraSelect"
                    class="form-select form-select-sm mt-2">

                    <option value="">
                        Select Camera
                    </option>

                </select>


                <!-- Stop Camera -->
                <button
                    type="button"
                    id="stopCamera"
                    class="btn btn-outline-danger btn-sm w-100 mt-2">

                    <i class="bi bi-camera-video-off"></i>
                    Stop Camera

                </button>


                <hr>


                <!-- Scan Result -->
                <label class="form-label">
                    Last Scanned
                </label>

                <input
                    type="text"
                    id="barcodeResult"
                    class="form-control form-control-sm text-center"
                    placeholder="Waiting for scan..."
                    readonly>

            </div>

        </div>

    </div>

</div>

</div>

<!-- ZXing -->

<script src="https://unpkg.com/@zxing/library@latest"></script>

<!-- Scanner JS -->

<script src="{{ url_for('static', filename='js/add_product_scanner.js') }}"></script>

<script>

/* Generate SKU */
function generateSKU() {

    const year = new Date().getFullYear();

    const random =
        Math.floor(Math.random() * 9000) + 1000;

    document.getElementById("sku").value =
        `SKU-${year}-${random}`;

}


/* Generate Barcode */
function generateBarcode() {

    let barcode = "";

    for (let i = 0; i < 13; i++) {
        barcode += Math.floor(Math.random() * 10);
    }

    document.getElementById("barcode").value =
        barcode;


    fetch(
        "/generate_barcode/" +
        encodeURIComponent(barcode)
    )

    .then(response => response.text())

    .then(path => {

        const image =
            document.getElementById("barcodeImage");

        image.src = "/" + path;

        document.getElementById(
            "barcodePreview"
        ).style.display = "block";

    })

    .catch(error => {

        console.error(
            "Barcode error:",
            error
        );

    });

}


/* Print Barcode */
function printBarcode() {

    const image =
        document.getElementById("barcodeImage");

    if (!image.src) {

        alert("Generate a barcode first.");

        return;

    }

    const printWindow =
        window.open("", "_blank");

    printWindow.document.write(`
        <html>
            <body style="
                text-align:center;
                padding:30px;
            ">
                <img src="${image.src}">
            </body>
        </html>
    `);

    printWindow.document.close();

    printWindow.onload = () => {

        printWindow.print();

        printWindow.close();

    };

}

</script>

{% endblock %}
