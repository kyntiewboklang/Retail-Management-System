<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Department Store Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<link rel="stylesheet" href="{{ url_for('static', filename='css/dashboard_style.css') }}">
</head>

<body>

<!-- ================= MOBILE NAVBAR ================= -->
<nav class="navbar navbar-dark bg-dark d-lg-none">
    <div class="container-fluid">

        <button class="navbar-toggler"
                type="button"
                data-bs-toggle="offcanvas"
                data-bs-target="#mobileMenu">
            <span class="navbar-toggler-icon"></span>
        </button>

        <span class="navbar-brand mb-0">
            <i class="bi bi-shop"></i> Store
        </span>

    </div>
</nav>

<!-- ================= MOBILE SIDEBAR ================= -->
<div class="offcanvas offcanvas-start bg-dark text-white"
     tabindex="-1"
     id="mobileMenu">

    <div class="offcanvas-header">
        <h5 class="offcanvas-title">
            <i class="bi bi-shop"></i> Store
        </h5>

        <button type="button"
                class="btn-close btn-close-white"
                data-bs-dismiss="offcanvas"></button>
    </div>

    <div class="offcanvas-body">

        <a class="d-block text-white text-decoration-none mb-3"
           href="/admin/dashboard">
            <i class="bi bi-speedometer2"></i> Dashboard
        </a>

        <a class="d-block text-white text-decoration-none mb-3"
           href="/admin/add_product">
            <i class="bi bi-box-seam"></i> Products
        </a>

        <a class="d-block text-white text-decoration-none mb-3"
           href="#">
            <i class="bi bi-cart-check"></i> Orders
        </a>

        <a class="d-block text-white text-decoration-none mb-3"
           href="#">
            <i class="bi bi-people"></i> Customers
        </a>

        <a class="d-block text-white text-decoration-none mb-3"
           href="#">
            <i class="bi bi-person-badge"></i> Staff
        </a>

        <a class="d-block text-white text-decoration-none mb-3"
           href="#">
            <i class="bi bi-graph-up-arrow"></i> Reports
        </a>

        <a class="d-block text-white text-decoration-none"
           href="#">
            <i class="bi bi-gear"></i> Settings
        </a>

    </div>

</div>

<!-- ================= DESKTOP SIDEBAR ================= -->
<div class="sidebar d-none d-lg-block">

    <h3><i class="bi bi-shop"></i> Store</h3>

    <a href="/admin/dashboard"><i class="bi bi-speedometer2"></i> Dashboard</a>
    <a href="/admin/add_product"><i class="bi bi-box-seam"></i> Products</a>
    <a href="/admin/available_stock"><i class="bi bi-cart-check"></i> Stocks</a>
    <a href="#"><i class="bi bi-people"></i> Customers</a>
    <a href="#"><i class="bi bi-person-badge"></i> Staff</a>
    <a href="#"><i class="bi bi-graph-up-arrow"></i> Reports</a>
    <a href="#"><i class="bi bi-gear"></i> Settings</a>

</div>

<!-- ================= MAIN CONTENT ================= -->
<div class="main">
    {% block content %}
    {% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://unpkg.com/@zxing/library@latest"></script>

</body>
</html>
