<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Apply for {{ job[1] }}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container py-5">

    <div class="row justify-content-center">

        <div class="col-lg-8">

            <div class="card shadow border-0">

                <div class="card-header bg-primary text-white text-center">

                    <h2 class="mb-0">

                        Apply for {{ job[1] }}

                    </h2>

                    <small>{{ job[2] }} Department</small>

                </div>

                <div class="card-body">

                    <form action="{{ url_for('submit_application') }}"
                          method="POST"
                          enctype="multipart/form-data">

                        <!-- Hidden Vacancy ID -->
                        <input
                            type="hidden"
                            name="vacancy_id"
                            value="{{ job[0] }}">

                        <h5 class="mb-3">

                            Personal Information

                        </h5>

                        <div class="row">

                            <div class="col-md-6 mb-3">

                                <label class="form-label">

                                    Full Name

                                </label>

                                <input
                                    type="text"
                                    name="full_name"
                                    class="form-control"
                                    required>

                            </div>

                            <div class="col-md-6 mb-3">

                                <label class="form-label">

                                    Email

                                </label>

                                <input
                                    type="email"
                                    name="email"
                                    class="form-control"
                                    required>

                            </div>

                        </div>

                        <div class="row">

                            <div class="col-md-6 mb-3">

                                <label class="form-label">

                                    Phone Number

                                </label>

                                <input
                                    type="text"
                                    name="phone"
                                    class="form-control"
                                    required>

                            </div>

                            <div class="col-md-6 mb-3">

                                <label class="form-label">

                                    Highest Qualification

                                </label>

                                <input
                                    type="text"
                                    name="qualification"
                                    class="form-control"
                                    required>

                            </div>

                        </div>

                        <div class="mb-3">

                            <label class="form-label">

                                Address

                            </label>

                            <textarea
                                name="address"
                                rows="3"
                                class="form-control"
                                required></textarea>

                        </div>

                        <div class="mb-3">

                            <label class="form-label">

                                Work Experience

                            </label>

                            <textarea
                                name="experience"
                                rows="4"
                                class="form-control"
                                placeholder="Freshers can write 'Fresher'"></textarea>

                        </div>

                        <hr>

                        <h5 class="mb-3">

                            Resume Upload

                        </h5>

                        <div class="mb-3">

                            <label class="form-label">

                                Upload Resume (PDF)

                            </label>

                            <input
                                type="file"
                                name="resume"
                                class="form-control"
                                accept=".pdf"
                                required>

                        </div>

                        <div class="form-check mb-4">

                            <input
                                class="form-check-input"
                                type="checkbox"
                                required>

                            <label class="form-check-label">

                                I certify that the information provided is true and correct.

                            </label>

                        </div>

                        <div class="d-flex justify-content-between">

                            <a href="/careers"
                               class="btn btn-secondary">

                                <i class="bi bi-arrow-left"></i>

                                Back

                            </a>

                            <button
                                type="submit"
                                class="btn btn-success">

                                <i class="bi bi-send-fill"></i>

                                Submit Application

                            </button>

                        </div>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

</body>

</html>
