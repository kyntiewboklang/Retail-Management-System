<div class="card shadow">

    <div class="card-header bg-success text-white">

        <h4 class="mb-0">
            <i class="bi bi-person-plus-fill"></i>
            Add New Staff
        </h4>

    </div>

    <div class="card-body">

        <form method="POST"
              action="{{ url_for('add_staff') }}">

            <div class="row">

                <div class="col-md-6 mb-3">

                    <label class="form-label">
                        Username
                    </label>

                    <input
                        type="text"
                        name="username"
                        class="form-control"
                        required>

                </div>

                <div class="col-md-6 mb-3">

                    <label class="form-label">
                        Email
                    </label>

                    <input
                        type="email"
                        name="email"
                        class="form-control"
                        required>

                </div>

            </div>

            <div class="row">

                <div class="col-md-6 mb-3">

                    <label class="form-label">
                        Password
                    </label>

                    <input
                        type="password"
                        name="password"
                        class="form-control"
                        required>

                </div>

                <div class="col-md-6 mb-3">

                    <label class="form-label">
                        Confirm Password
                    </label>

                    <input
                        type="password"
                        name="confirm_password"
                        class="form-control"
                        required>

                </div>

            </div>

            <button
                type="submit"
                class="btn btn-success">

                <i class="bi bi-save"></i>

                Save Staff

            </button>

        </form>

    </div>

</div>
