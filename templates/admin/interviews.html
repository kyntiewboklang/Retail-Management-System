{% extends "base.html" %}

{% block content %}

<div class="container-fluid py-4">

    <div class="text-center mb-4">

        <h2 class="fw-bold">

            <i class="bi bi-calendar-event text-primary"></i>

            Interview Schedule

        </h2>

    </div>

    <div class="card shadow">

        <div class="card-body">

            <table class="table table-hover">

                <thead class="table-dark">

                    <tr>

                        <th>Applicant</th>

                        <th>Position</th>

                        <th>Date</th>

                        <th>Time</th>

                        <th>Interviewer</th>

                        <th>Status</th>

                    </tr>

                </thead>

                <tbody>

                {% for interview in interviews %}

                <tr>

                    <td>{{ interview[1] }}</td>

                    <td>{{ interview[2] }}</td>

                    <td>{{ interview[3] }}</td>

                    <td>{{ interview[4] }}</td>

                    <td>{{ interview[5] }}</td>

                    <td>

                        <span class="badge bg-info">

                            {{ interview[6] }}

                        </span>

                    </td>

                </tr>

                {% endfor %}

                </tbody>

            </table>

        </div>

    </div>

</div>

{% endblock %}
