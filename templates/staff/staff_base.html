<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Department Store Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<link rel="stylesheet" href="{{ url_for('static', filename='css/dashboard_style.css') }}">
<link rel="stylesheet" href="{{ url_for('static', filename='css/products.css') }}">

</head>
<body>

    <div class="sidebar">

    <h3><i class="bi bi-shop"></i> Store</h3>

    <a href="/staff/staff_dashboard"><i class="bi bi-speedometer2"></i> Dashboard</a>
    <!-- <a href="/staff/staff_products"><i class="bi bi-box-seam"></i> Products</a>-->
    <!-- <a href="#"><i class="bi bi-upc-scan"></i> Barcode Scanner</a> -->
    <a href="#"><i class="bi bi-gear"></i> Settings</a>
    <a href="{{ url_for('logout') }}"><i class="bi bi-box-arrow-right"></i> Logout</a>

    </div>

    <div class="main">
        {% block content %}
        {% endblock %}
    </div>

<script>

function showViewProducts() {

    document.getElementById("view-products").style.display = "block";

    document.getElementById("btnView").classList.remove("btn-outline-primary");
    document.getElementById("btnView").classList.add("btn-primary");

}
</script>

</body>
</html>
