{% extends "admin/base.html" %}

{% block content %}

<div class="container-fluid py-4">

    <div class="text-center mb-4">

        <h2 class="fw-bold">

            <i class="bi bi-calendar-plus text-primary"></i>

            Schedule Interview

        </h2>

    </div>

    <div class="row justify-content-center">

        <div class="col-lg-8">

            <div class="card shadow">

                <div class="card-header bg-primary text-white">

                    <h5 class="mb-0">

                        Interview Details

                    </h5>

                </div>

                <div class="card-body">

                    <h4>{{ application[1] }}</h4>

                    <p class="text-muted">

                        Applying for {{ application[10] }}

                    </p>

                    <hr>

                    <form method="POST"
                          action="{{ url_for('save_interview') }}">

                        <input
                            type="hidden"
                            name="application_id"
                            value="{{ application[0] }}">

                        <div class="row">

                            <div class="col-md-6 mb-3">

                                <label class="form-label">

                                    Interview Date

                                </label>

                                <input
                                type="date"
                                name="interview_date"
                                class="form-control"
                                required>

                            </div>

                            <div class="col-md-6 mb-3">

                                <label class="form-label">

                                    Interview Time

                                </label>

                                <input
                                type="time"
                                name="interview_time"
                                class="form-control"
                                required>

                            </div>

                        </div>

                        <div class="mb-3">

                            <label class="form-label">

                                Interviewer

                            </label>

                            <input
                                type="text"
                                name="interviewer"
                                class="form-control"
                                placeholder="Manager Name"
                                required>

                        </div>

                        <div class="mb-3">

                            <label class="form-label">

                                Interview Type

                            </label>

                            <select
                                name="interview_type"
                                class="form-select">

                                <option>In Person</option>

                                <option>Online</option>

                            </select>

                        </div>

                        <div class="mb-3">

                            <label class="form-label">

                                Location

                            </label>

                            <input
                                type="text"
                                name="location"
                                class="form-control">

                        </div>

                        <div class="mb-4">

                            <label class="form-label">

                                Remarks

                            </label>

                            <textarea
                                name="remarks"
                                rows="4"
                                class="form-control"></textarea>

                        </div>

                        <div class="text-end">

                            <button
                                class="btn btn-success">

                                Save Interview

                            </button>

                        </div>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
