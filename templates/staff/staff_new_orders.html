{% extends "staff/staff_base.html" %}
{% block content %}

<div class="container py-4">

    <div class="d-flex justify-content-between align-items-center mb-4">

    <h2>
    <i class="bi bi-cart-check">New Order</i>
    </h2>

    </div>

    <div class="card p-4 mb-4">

        <div class="row">
            <div class="card mb-4 shadow-sm">

                <div class="card-header bg-dark text-white">

                    <h5 class="mb-0">
                        <i class="bi bi-upc-scan"></i>
                        Barcode Scanner
                    </h5>

                </div>

                <div class="card-body text-center">

                    <div id="reader" class="mx-auto"></div>

                    <div id="status" class="mt-3 text-success fw-bold">
                        Ready to scan...
                    </div>

                </div>

            </div>
        </div>

    </div>

    <div class="row">

        <div class="col-lg-8">

            <div class="card p-3">

            <h4 class="mb-3">Order Items</h4>

            <table class="table table-hover">

                <thead class="table-dark">

                    <tr>

                        <th>Product</th>
                        <th>Price</th>
                        <th width="180">Qty</th>
                        <th>Total</th>
                        <th></th>

                    </tr>

                </thead>

                <tbody id="orderItems">

                    <tr id="emptyRow">
                        <td colspan="5" class="text-center">
                            No product scanned.
                        </td>
                    </tr>

                </tbody>

            </table>

            </div>

        </div>

    <div class="col-lg-4">

    <div class="card summary p-4">

    <h4 class="mb-4">
        Order Summary
    </h4>

    <div class="d-flex justify-content-between total-box">
        <span>Items</span>
        <strong id="itemCount">0</strong>
    </div>

    <hr>

    <div class="d-flex justify-content-between total-box">
        <span>Subtotal</span>
        <strong id="subtotal">₹0</strong>
    </div>

    <hr>

    <div class="d-flex justify-content-between total-box">
        <span>Discount</span>
        <strong id="discount">₹0</strong>
    </div>

    <hr>

    <div class="d-flex justify-content-between total-box">
        <span>Tax</span>
        <strong id="tax">₹0</strong>
    </div>

    <hr>

    <div class="d-flex justify-content-between fs-4">

        <strong>Total</strong>
        <strong id="total">₹0</strong>

    </div>

    <div class="mt-4">

        <label class="form-label">
            Payment Method
        </label>

        <select id="paymentMethod" class="form-select">
            <option value="Cash">Cash</option>
            <option value="Card">Card</option>
            <option value="UPI">UPI</option>
        </select>

    </div>

    <button
        id="completeOrder"
        class="btn btn-warning w-100">

        <i class="bi bi-check-circle"></i>

        Complete Order

    </button>

    </div>

    </div>

    </div>
</div>

<!-- html5-qrcode -->
<script src="https://unpkg.com/html5-qrcode"></script>
<script src="{{ url_for('static', filename='js/staff_scanner.js') }}"></script>


{% endblock %}
