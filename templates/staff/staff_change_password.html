{% extends "staff/staff_base.html" %}

{% block content %}

<div class="container-fluid">

    <div class="row justify-content-center">

        <div class="col-md-6">

            <div class="card shadow-lg border-0 mt-5">

                <div class="card-body p-5">

                    <h2 class="text-center mb-4">
                        Change Password
                    </h2>

                    <form method="POST">

                        <div class="mb-3">
                            <label class="form-label">
                                Current Password
                            </label>

                            <input
                                type="password"
                                class="form-control"
                                name="current_password"
                                placeholder="Enter current password"
                                required>

                        </div>

                        <div class="mb-3">
                            <label class="form-label">
                                New Password
                            </label>

                            <input
                                type="password"
                                class="form-control"
                                name="new_password"
                                placeholder="Enter new password"
                                required>
                        </div>

                        <div class="mb-4">
                            <label class="form-label">
                                Confirm New Password
                            </label>

                            <input
                                type="password"
                                class="form-control"
                                name="confirm_password"
                                placeholder="Confirm new password"
                                required>
                        </div>

                        <div class="d-grid">
                            <button
                                type="submit"
                                class="btn btn-primary btn-lg">

                                Update Password

                            </button>
                        </div>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
