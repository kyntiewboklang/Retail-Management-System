{% extends "admin/base.html" %}

{% block content %}

<div class="container-fluid">

    <!-- Header -->
    <div class="d-flex justify-content-between align-items-center mb-4">

        <div>
            <h2 class="fw-bold">
                <i class="bi bi-gear-fill"></i>
                Settings
            </h2>
            <p class="text-muted mb-0">
                Manage your store configuration
            </p>
        </div>

        <a href="/logout" class="btn btn-danger">
            <i class="bi bi-box-arrow-right"></i>
            Logout
        </a>

    </div>


    <div class="row">

        <!-- Left Menu -->

        <div class="col-lg-3 mb-4">

            <div class="card shadow-sm">

                <div class="list-group list-group-flush">

                    <a href="#business" class="list-group-item list-group-item-action">
                        <i class="bi bi-shop"></i>
                        Business
                    </a>

                    <a href="#inventory" class="list-group-item list-group-item-action">
                        <i class="bi bi-box-seam"></i>
                        Inventory
                    </a>

                    <a href="#receipt" class="list-group-item list-group-item-action">
                        <i class="bi bi-receipt"></i>
                        Receipt
                    </a>

                    <a href="#barcode" class="list-group-item list-group-item-action">
                        <i class="bi bi-upc-scan"></i>
                        Barcode
                    </a>

                    <a href="#email" class="list-group-item list-group-item-action">
                        <i class="bi bi-envelope"></i>
                        Email
                    </a>

                    <a href="#security" class="list-group-item list-group-item-action">
                        <i class="bi bi-shield-lock"></i>
                        Security
                    </a>

                </div>

            </div>

        </div>


        <!-- Settings -->

        <div class="col-lg-9">

            <!-- Business -->

            <div class="card shadow-sm mb-4" id="business">

                <div class="card-header bg-white">
                    <h5 class="mb-0">Business Information</h5>
                </div>

                <div class="card-body">

                    <div class="row">

                        <div class="col-md-6 mb-3">

                            <label class="form-label">
                                Store Name
                            </label>

                            <input
                                   type="text"
                                   class="form-control">

                        </div>

                        <div class="col-md-6 mb-3">

                            <label class="form-label">
                                Owner Name
                            </label>

                            <input
                                   type="text"
                                   class="form-control">

                        </div>

                        <div class="col-md-6 mb-3">

                            <label class="form-label">
                                Phone
                            </label>

                            <input
                                   type="text"
                                   class="form-control">

                        </div>

                        <div class="col-md-6 mb-3">

                            <label class="form-label">
                                Email
                            </label>

                            <input
                                   type="email"
                                   class="form-control">

                        </div>

                        <div class="col-12">

                            <label class="form-label">
                                Address
                            </label>

                            <textarea class="form-control" rows="3"></textarea>

                        </div>

                    </div>

                </div>

            </div>


            <!-- Inventory -->

            <div class="card shadow-sm mb-4" id="inventory">

                <div class="card-header bg-white">
                    <h5>Inventory Settings</h5>
                </div>

                <div class="card-body">

                    <div class="row">

                        <div class="col-md-4">

                            <label>Low Stock Alert</label>

                            <input
                                   type="number"
                                   class="form-control">

                        </div>

                        <div class="col-md-4">

                            <label>Critical Stock</label>

                            <input
                                   type="number"
                                   class="form-control">

                        </div>

                        <div class="col-md-4">

                            <label>Default Tax (%)</label>

                            <input
                                   type="number"
                                   class="form-control">

                        </div>

                    </div>

                    <hr>

                    <div class="form-check form-switch mb-2">

                        <input class="form-check-input"
                               type="checkbox">

                        <label class="form-check-label">
                            Allow Negative Stock
                        </label>

                    </div>

                    <div class="form-check form-switch">

                        <input class="form-check-input"
                               type="checkbox"
                               checked>

                        <label class="form-check-label">
                            Auto Generate SKU
                        </label>

                    </div>

                </div>

            </div>


            <!-- Receipt -->

            <div class="card shadow-sm mb-4" id="receipt">

                <div class="card-header bg-white">
                    <h5>Receipt Settings</h5>
                </div>

                <div class="card-body">

                    <div class="row">

                        <div class="col-md-4">

                            <label>Invoice Prefix</label>

                            <input class="form-control" value="INV-">

                        </div>

                        <div class="col-md-4">

                            <label>Receipt Prefix</label>

                            <input class="form-control" value="REC-">

                        </div>

                        <div class="col-md-4">

                            <label>Currency</label>

                            <select class="form-select">

                                <option>INR ₹</option>

                            </select>

                        </div>

                    </div>

                </div>

            </div>


            <!-- Security -->

            <div class="card shadow-sm mb-4" id="security">

                <div class="card-header bg-white">
                    <h5>Security</h5>
                </div>

                <div class="card-body">

                    <div class="form-check form-switch mb-3">

                        <input class="form-check-input"
                               type="checkbox"
                               checked>

                        <label class="form-check-label">
                            Strong Passwords
                        </label>

                    </div>

                    <div class="form-check form-switch mb-3">

                        <input class="form-check-input"
                               type="checkbox">

                        <label class="form-check-label">
                            Two-Factor Authentication
                        </label>

                    </div>

                    <div class="form-check form-switch">

                        <input class="form-check-input"
                               type="checkbox"
                               checked>

                        <label class="form-check-label">
                            Remember Login
                        </label>

                    </div>

                </div>

            </div>


            <!-- Email -->

            <div class="card shadow-sm mb-4" id="email">

                <div class="card-header bg-white">
                    <h5>Email Settings</h5>
                </div>

                <div class="card-body">

                    <div class="row">

                        <div class="col-md-6">

                            <label>SMTP Server</label>

                            <input class="form-control">

                        </div>

                        <div class="col-md-3">

                            <label>Port</label>

                            <input class="form-control">

                        </div>

                        <div class="col-md-3">

                            <label>Encryption</label>

                            <select class="form-select">

                                <option>TLS</option>
                                <option>SSL</option>

                            </select>

                        </div>

                    </div>

                </div>

            </div>


            <div class="text-end">

                <button class="btn btn-primary btn-lg">
                    <i class="bi bi-check-circle"></i>
                    Save Settings
                </button>

            </div>

        </div>

    </div>

</div>

{% endblock %}
