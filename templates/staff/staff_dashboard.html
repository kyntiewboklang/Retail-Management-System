{% extends "staff/staff_base.html" %}

{% block content %}

<h2 class="mb-4">

    Welcome,
    {{ session["username"] }}

</h2>

<div class="row">

    <div class="col-md-3">

        <div class="card p-4 text-center">

            <i class="bi bi-cart-fill fs-1 text-primary"></i>

            <h5 class="mt-3">

                Today's Orders

            </h5>

            <h2>25</h2>

        </div>

    </div>

    <div class="col-md-3">

        <div class="card p-4 text-center">

            <i class="bi bi-box-seam fs-1 text-success"></i>

            <h5 class="mt-3">

                Products

            </h5>

            <h2>824</h2>

        </div>

    </div>

    <div class="col-md-3">

        <div class="card p-4 text-center">

            <i class="bi bi-people fs-1 text-warning"></i>

            <h5 class="mt-3">

                Customers

            </h5>

            <h2>145</h2>

        </div>

    </div>

    <div class="col-md-3">

        <div class="card p-4 text-center">

            <i class="bi bi-currency-rupee fs-1 text-danger"></i>

            <h5 class="mt-3">

                Sales Today

            </h5>

            <h2>₹8,450</h2>

        </div>

    </div>

</div>

<div class="card mt-5">

    <div class="card-header">

        Quick Actions

    </div>

    <div class="card-body">

        <div class="d-grid gap-3">

            <a href="#"
               class="btn btn-primary">

                <i class="bi bi-cart-plus"></i>

                Create New Order

            </a>

            <a href="#"
               class="btn btn-success">

                <i class="bi bi-upc-scan"></i>

                Scan Barcode

            </a>

            <a href="#"
               class="btn btn-dark">

                <i class="bi bi-box-seam"></i>

                View Products

            </a>

        </div>

    </div>

</div>

{% endblock %}
